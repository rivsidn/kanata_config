<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="600" viewBox="0 0 1220 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5efe1"/>
      <stop offset="0.52" stop-color="#eaf5ef"/>
      <stop offset="1" stop-color="#edf2fb"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#5d4d35" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 800 31px 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif; fill: #26322c; letter-spacing: .3px; }
      .subtitle { font: 15px 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif; fill: #756b5d; }
      .legend { font: 13px 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif; fill: #756b5d; dominant-baseline: middle; }
      .legendbox { stroke-width: 1.3; }
      .keywrap { filter: url(#shadow); }
      .key { stroke-width: 1.35; }
      .neutral { fill: #fffaf1; stroke: #d2bea4; }
      .quote { fill: #d9f4eb; stroke: #4da792; }
      .trigger { fill: #ffe4b8; stroke: #d28b25; }
      .alt { fill: #dfe9ff; stroke: #5d83d6; }
      .disabled { fill: #ece4dc; stroke: #aa9582; }
      .altchip { fill: rgba(223,233,255,.92); stroke: #5d83d6; stroke-width: .8; }
      .main { font: 800 22px 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif; fill: #26322c; dominant-baseline: central; }
      .wide { font-size: 15px; }
      .small { font: 700 11.5px 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif; dominant-baseline: central; }
      .tiny { font-size: 10px; }
      .phys { font: 800 11px 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif; fill: rgba(38,50,44,.56); dominant-baseline: central; }
      .neutral_text { fill: #26322c; }
      .quote_text { fill: #114c43; }
      .trigger_text { fill: #6c3d00; }
      .alt_text { fill: #163f86; }
      .disabled_text { fill: #8a7162; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <text x="54" y="44" class="title">当前键位映射图</text>
  <text x="54" y="73" class="subtitle">绿色：按住 ' 的符号/导航层；蓝色：左 Alt + Backspace/M/U/I/H/J/K/L；橙色：层键与 Caps 组合。</text>
  <text x="54" y="98" class="subtitle">Enter 为普通回车；' 仅作为层键；左 Alt+Backspace 重载配置，左 Alt+M 后接数字/字母触发本地宏。</text>

